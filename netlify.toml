# Static preview: connect this repo in Netlify → Site settings uses this file automatically.
# Build runs in source/; Vue Router (history) needs SPA fallback.

[build]
base = "source"
command = "if [ -z \"$BACKEND_API_ORIGIN\" ]; then echo \"Missing BACKEND_API_ORIGIN\"; exit 1; fi; sed -i \"s|BACKEND_API_ORIGIN_PLACEHOLDER|$BACKEND_API_ORIGIN|g\" ../netlify.toml; npm run build"
publish = "dist"

[[redirects]]
from = "/api/*"
to = "BACKEND_API_ORIGIN_PLACEHOLDER/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
