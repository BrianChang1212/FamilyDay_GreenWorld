# Static preview: connect this repo in Netlify → Site settings uses this file automatically.
# Build runs in source/; Vue Router (history) needs SPA fallback.

[build]
base = "source"
command = "npm run build"
publish = "dist"

[[redirects]]
from = "/api/*"
to = "https://BACKEND_HOST_PLACEHOLDER/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
